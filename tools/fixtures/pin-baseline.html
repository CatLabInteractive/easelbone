<!DOCTYPE html>
<html>
<head lang="en">
    <title>Pinner baseline fixture</title>
    <style>body { margin: 0; }</style>
</head>
<body>
<canvas id="canvas" width="400" height="400"></canvas>
<script src="/app/scripts/vendor/requirejs/require.js"></script>
<script>
    // Fixture for tools/pin-test.js.
    //
    // Layout (bottom -> top layer order):
    //   layer 0 (main): black background
    //   layer 1: RED anchor box (50x50) at (100,100); a GREEN child box is
    //            added to it, then pinned.
    //   layer 2: a full-canvas BLUE occluder (simulates the smiley layer).
    //   pin layer (layer 3): the GREEN box is reparented here by pinToTop.
    //
    // If pinning works, the GREEN box paints on TOP of the BLUE occluder at
    // the anchor's position. Moving the anchor moves the GREEN box.
    //
    // window.__ready flips true after first paint.
    // window.__moveAnchor(dx,dy) shifts the anchor and repaints.
    // window.__rePinNewBox() pins a NEW green box to the SAME anchor
    //   (simulates a re-render that regenerates the pinned content).
    // window.__pinAgain() calls pinToTop again on the CURRENTLY pinned box
    //   (idempotent re-pin of the same instance).
    // window.__pinnedCount() returns stage._pinnedElements.length.
    // window.__removeAnchor() removes the anchor from its layer (auto-teardown).
    require.config({ baseUrl: '/app/scripts/' });
    require(['main'], function () {
        require([
            'easeljs',
            'CatLab/Easelbone/Views/Root',
            'CatLab/Easelbone/FrontController'
        ], function (createjs, RootView, easelbone) {
            // FrontController returns the easelbone namespace object (the same
            // object the built bundle exposes as `easelbone`), including
            // pinToTop / unpinFromTop.

            var root = new RootView({ canvas: document.getElementById('canvas') });

            // layer 1: anchor + green child
            var anchorLayer = root.nextLayer('anchor');
            var anchor = new createjs.Container();
            anchor.x = 100; anchor.y = 100;
            anchor.setBounds(0, 0, 50, 50);
            var red = new createjs.Shape();
            red.graphics.beginFill('#ff0000').drawRect(0, 0, 50, 50);
            anchor.addChild(red);

            var green = new createjs.Shape();
            green.__id = 1;
            green.graphics.beginFill('#00ff00').drawRect(0, 0, 50, 50);
            anchor.addChild(green);
            anchorLayer.container.addChild(anchor);

            // layer 2: full blue occluder
            var occLayer = root.nextLayer('occluder');
            var blue = new createjs.Shape();
            blue.graphics.beginFill('#0000ff').drawRect(0, 0, 400, 400);
            occLayer.container.addChild(blue);

            // pin layer: above occluder
            var pinLayer = root.nextLayer('pin');
            root.setPinContainer(pinLayer.container);

            // main layer background (layer 0)
            var bg = new createjs.Shape();
            bg.graphics.beginFill('#000').drawRect(0, 0, 400, 400);
            root.getLayer('main').container.addChild(bg);

            easelbone.pinToTop(green);
            var currentPinned = green;
            var nextId = 2;

            window.__moveAnchor = function (dx, dy) {
                anchor.x += dx; anchor.y += dy;
                root.render();
            };

            // Suppression: hide/show all pinned overlays (e.g. while a modal is
            // open) via the stage flag the Pinner honors.
            window.__setPinsHidden = function (b) {
                root.stage._pinsHidden = b;
                root.render();
            };

            // Simulates a re-render that regenerates the pinned content: a
            // brand-new object instance pinned to the SAME anchor. Should
            // replace (not stack on top of) the previously pinned box.
            window.__rePinNewBox = function () {
                var box = new createjs.Shape();
                box.__id = nextId++;
                box.graphics.beginFill('#00ff00').drawRect(0, 0, 50, 50);
                anchor.addChild(box);
                easelbone.pinToTop(box);
                currentPinned = box;
                root.render();
                return box.__id;
            };

            // Calls pinToTop again on the object that's already pinned
            // (same instance) -- must be a no-op, not a second record.
            window.__pinAgain = function () {
                easelbone.pinToTop(currentPinned);
                root.render();
            };

            window.__pinnedCount = function () {
                return root.stage._pinnedElements ? root.stage._pinnedElements.length : 0;
            };

            window.__pinnedRecordId = function () {
                var records = root.stage._pinnedElements;
                return (records && records.length) ? records[0].obj.__id : null;
            };

            // Returns [width, height] of the pinned record's wrapper bounds,
            // or null. Proves the wrapper carries the anchor's bounds (so a
            // bounds-sizing child, e.g. a Fill, would size to the anchor's
            // dimensions rather than falling back to a 100x100 default).
            window.__wrapperBounds = function () {
                var records = root.stage._pinnedElements;
                if (!records || !records.length || !records[0].wrapper) {
                    return null;
                }
                var b = records[0].wrapper.getBounds();
                return b ? [b.width, b.height] : null;
            };

            // Removes the anchor from the stage entirely; sync() should
            // auto-teardown the pin on the next render.
            window.__removeAnchor = function () {
                anchorLayer.container.removeChild(anchor);
                root.render();
            };

            // Deferral: pin an object whose anchor is NOT yet on the stage.
            // The object is addChild'd to its anchor (so its 'added' event has
            // already fired) BEFORE pinToTop is called and BEFORE the anchor is
            // attached to a layer. pinToTop must retry on the ticker and only
            // complete once the anchor is on the stage.
            var deferAnchor = null, deferBox = null;
            window.__deferSetup = function () {
                deferAnchor = new createjs.Container();
                deferAnchor.x = 250; deferAnchor.y = 250;
                deferAnchor.setBounds(0, 0, 40, 40);
                deferBox = new createjs.Shape();
                deferBox.__id = 999;
                deferBox.graphics.beginFill('#00ff00').drawRect(0, 0, 40, 40);
                deferAnchor.addChild(deferBox); // 'added' fires here, before pinToTop
                easelbone.pinToTop(deferBox);   // deferBox.getStage() is null -> must defer
            };
            window.__deferAttach = function () {
                anchorLayer.container.addChild(deferAnchor); // now on the stage
                root.render();
            };
            window.__deferBoxPinned = function () {
                var records = root.stage._pinnedElements || [];
                for (var i = 0; i < records.length; i++) {
                    if (records[i].obj === deferBox) { return true; }
                }
                return false;
            };

            // Crash guard + positioning: pin against an anchor whose getBounds()
            // throws on EVERY access (as a MovieClip with an incomplete-bounds
            // descendant does). _syncRecord must (a) not let the exception break
            // the tick loop and (b) STILL position the pin from the anchor's
            // matrix -- getBounds is only for optional child-sizing and must not
            // block positioning. The anchor is at (300,300), so the pinned box
            // must render there, not stuck at the pin container's origin.
            window.__pinThrowingAnchor = function () {
                var throwing = new createjs.Container();
                throwing.x = 300; throwing.y = 300;
                throwing.setBounds(0, 0, 30, 30);
                throwing.getBounds = function () {
                    throw new TypeError("Cannot read properties of undefined (reading 'x')");
                };
                var box = new createjs.Shape();
                box.graphics.beginFill('#00ff00').drawRect(0, 0, 30, 30);
                throwing.addChild(box);
                anchorLayer.container.addChild(throwing);
                easelbone.pinToTop(box);  // anchor = throwing; getBounds always throws
                root.render();
                root.render();
            };

            root.render();
            window.__ready = true;
        });
    });
</script>
</body>
</html>
